    <main>
      <section class="Register">
        <div class="RegisterHeader">
          <h1>Create an Account</h1>
          <p>Join us and start ordering your favourite dishes</p>
        </div>
        <form action="#" id="RegisterForm">
          <div class="RegisterFormRow">
            <div class="RegisterField">
              <label>First Name</label>
              <input type="text" placeholder="John" id="FirstName" required />
            </div>
            <div class="RegisterField">
              <label>Last Name</label>
              <input type="text" placeholder="Doe" id="LastName" required />
            </div>
          </div>

          <div class="RegisterField">
            <label>Email</label>
            <input
              type="email"
              placeholder="john@example.com"
              id="Email"
              required
            />
          </div>

          <div class="RegisterField">
            <label>Password</label>
            <input
              type="password"
              placeholder="••••••••"
              id="Password"
              required
            />
          </div>

          <div class="RegisterField">
            <label>Phone Number</label>
            <input
              type="tel"
              placeholder="+1 234 567 8900"
              id="PhoneNumber"
              required
            />
          </div>

          <div class="RegisterBtnRow">
            <button
              class="RegisterBtn RegisterBtnRegister"
              id="RegSubmit"
              type="submit"
            >
              Register
            </button>
            <button
              class="RegisterBtn RegisterBtnReset"
              id="ResetBtn"
              type="reset"
            >
              Reset
            </button>
          </div>
        </form>

        <p class="RegisterSigninLink">
          Already have an account? <button>Sign In</button>
        </p>
      </section>
      <section class="Login">
        <div class="LoginHeader">
          <h1>Welcome Back</h1>
          <p>Sign in to continue ordering your favourite dishes</p>
        </div>
 
        <form action="#" id="LoginForm">
 
          <div class="LoginField">
            <label>Phone Number</label>
            <input type="tel" placeholder="+1 234 567 8900" id="PhoneNumber" required/>
          </div>
 
          <div class="LoginField">
            <label>Password</label>
            <input type="password" placeholder="••••••••" id="Password" required/>
          </div>
 
          <div class="LoginBtnRow">
            <button class="LoginBtn LoginBtnSubmit" id="LoginSubmit" type="submit">Sign In</button>
            <button class="LoginBtn LoginBtnReset" id="ResetBtn" type="reset">Reset</button>
          </div>
 
        </form>
 
        <p class="LoginRegisterLink">Don't have an account? <button>Register</button></p>
      </section>
