    <main>
  <div class="checkout-wrap">

    <div class="checkout-card">
      <div class="checkout-header">
        <h1>Payment Details</h1>
        <p>Your order is almost ready — fill in your card info</p>
      </div>
 

      <div class="checkout-card-visual">
        <div class="checkout-card-brand">Bao House</div>
        <div class="checkout-card-chip"></div>
        <div class="checkout-card-number">•••• •••• •••• ••••</div>
        <div class="checkout-card-bottom">
          <div>
            <div class="checkout-card-label">Expires</div>
            <div class="checkout-card-value">MM / YYYY</div>
          </div>
          <div>
            <div class="checkout-card-label">CVV</div>
            <div class="checkout-card-value">•••</div>
          </div>
        </div>
      </div>
 <form action="#">
      <div class="checkout-field">
        <label>Card Number</label>
        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
      </div>
 
      <div class="checkout-form-row">
        <div class="checkout-field">
          <label>Expiry Month</label>
          <div class="checkout-select-wrap">
            <select id="expMonth" required>
              <option value="" disabled selected>Month</option>
              <option>01</option><option>02</option><option>03</option>
              <option>04</option><option>05</option><option>06</option>
              <option>07</option><option>08</option><option>09</option>
              <option>10</option><option>11</option><option>12</option>
            </select>
          </div>
        </div>
        <div class="checkout-field">
          <label>Expiry Year</label>
          <div class="checkout-select-wrap">
            <select id="expYear" required>
              <option value="" disabled selected>Year</option>
              <option>2026</option>
              <option>2027</option>
              <option>2028</option>
              <option>2029</option>
              <option>2030</option>
              <option>2031</option>
              <option>2032</option>
              <option>2033</option>
              <option>2034</option>
              <option>2035</option>
              <option>2036</option>
            </select>
          </div>
        </div>
      </div>
 
      <!-- CVV -->
      <div class="checkout-field">
        <label>CVV</label>
        <input type="password" id="cvv" placeholder="•••" maxlength="4" required/>
      </div>
 <button class="pay" type="submit" >Confirm & Pay</button>
</form>


      <div class="checkout-secure-note">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Secured with 256-bit SSL encryption
      </div>
    </div>
 
    <!-- RIGHT: Order Summary -->
    <div class="checkout-card checkout-summary">
      <div>
        <div class="checkout-summary-title">Order Summary</div>
        <div class="checkout-summary-subtitle">Bao House</div>
      </div>
 
      <div class="checkout-items">
        
      </div>
 
      <div class="checkout-totals">
        <div class="checkout-total-row grand"><span>Total</span><p>0$</p></div>
      </div>
