    <main>
      <section class="productCard">
        <h2>Our Products</h2>
        <div class="Categories kablammo"></div>
        <form class="FilterDiv">
          <label for="VegeterianFilter">Vegeterian</label>
          <select id="VegeterianFilter">
            <option value="">Show All</option>
            <option value="true">Vegeterian</option>
            <option value="false">Not Vegeterian</option>
          </select>
          <label for="NutsFilter">Nuts</label>
          <select id="NutsFilter">
            <option value="">Show All</option>
            <option value="true">Nuts</option>
            <option value="false">No Nuts</option>
          </select>
          <label for="SpicinessFilter">Spiciness</label>
          <select id="SpicinessFilter">
            <option value="">Show All</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
          <label for="CategoryFilter">Categories</label>
          <select id="CategoryFilter"></select>
          <div class="FiltButtons">
            <button type="submit" id="FilterSubmit">Submit</button>
            <button type="reset" id="FilterReset">Reset</button>
          </div>
        </form>
        <div class="product-grid"></div>
      </section>
      <section class="hidden CartSection">
        <h2 class="montserrat">CART ITEMS</h2>
        <div class="CartItemHeadBar">
          <span>Product</span>
          <span>Quantity</span>
          <span>Price</span>
          <span>Total Price</span>
        </div>
        <div class="cartItems">
          
          </div>
       
        <div class="cartCheckout flex-row">
          <span>Total: <strong class="TotalPrice">$0</strong></span>
          <button id="Checkout">Go To Checkout</button>
        </div>
      </section>
